name: calibre
services:
  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web-automated
    env_file:
      - stack.env
    volumes:
      # Config/app data — migrating from CW: stop the old instance, copy its config folder here
      - /DATA/AppData/calibre/config:/config
      # Ingest dir (not the library): files dropped here are auto-imported then DELETED
      - /DATA/AppData/calibre/ingest:/cwa-book-ingest
      # Calibre library; CWA will auto-create metadata.db if starting fresh
      - /DATA/AppData/calibre/library:/calibre-library
      # Optional: Calibre plugins (also requires customize.py.json in the config volume)
      - /DATA/AppData/calibre/plugins:/config/.config/calibre/plugins
      # Gmail OAuth2 creds: CWA reads gmail.json from its app root (NOT /config), so
      # mount the persistent file there to survive image updates. Source must exist first.
      - /DATA/AppData/calibre/config/gmail.json:/app/calibre-web-automated/gmail.json
    ports:
      - "11143:8083"
    restart: unless-stopped
    network_mode: bridge
