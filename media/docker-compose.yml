name: media

##############NETWORKS##############
networks:
  default:
    name: media
    external: true
  vpn:
    name: vpn
    external: true
##############NETWORKS##############

services:
  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_CONFIG_DIR}/bazarr:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "33331:6767"
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    volumes:
      - ${MEDIA_CONFIG_DIR}/lidarr:/config
      - ${MEDIA_DIR}:/media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    ports:
      - "33332:8686"

  nzbget: #usenet download agent
    image: ghcr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_CONFIG_DIR}/nzbget:/config
      - ${MEDIA_DIR}/usenet:/media/usenet
    ports:
      - "33333:6789"
    restart: unless-stopped

  seerr: #media requesting tool
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_CONFIG_DIR}/seerr:/app/config
    ports:
      - "33334:5055"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  plex: # Media Server
    container_name: plex
    image: ghcr.io/hotio/plex:latest
    restart: unless-stopped
    logging:
      driver: json-file
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
      - DEBUG=no
      - PLEX_PASS=${PLEX_PASS}
      - PLEX_CLAIM_TOKEN=${PLEX_CLAIM_TOKEN}
      - PLEX_ADVERTISE_URL=${PLEX_ADVERTISE_URL}
      - PLEX_NO_AUTH_NETWORKS=${PLEX_NO_AUTH_NETWORKS}
    volumes:
      - ${MEDIA_CONFIG_DIR}/plex:/config
      - ${PLEX_MEDIA_DIR}:/data
      - /tmp:/transcode
    network_mode: host

  prowlarr: #indexer manager for Sonarr & Radarr
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_CONFIG_DIR}/prowlarr:/config
    ports:
      - "33335:9696"
    restart: unless-stopped

  radarr: #movie search agent
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${MEDIA_CONFIG_DIR}/radarr:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "33336:7878"
    restart: unless-stopped


  sonarr: #TV show search agent
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${MEDIA_CONFIG_DIR}/sonarr:/config
      - ${MEDIA_DIR}:/media
    ports:
      - "33337:8989"
    restart: unless-stopped

  notifiarr:
    container_name: notifiarr
    hostname: notifiarr
    image: golift/notifiarr:latest
    restart: unless-stopped
    ports:
      - "33340:5454"
    volumes:
      - ${MEDIA_CONFIG_DIR}/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id

  tautulli: #plex monitoring
    image: ghcr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
      - DEBUG=no
    volumes:
      - ${MEDIA_CONFIG_DIR}/tautulli:/config
    ports:
      - "33338:8181"
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${MEDIA_CONFIG_DIR}/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${GLUETUN_VPN_PROVIDER}
      - OPENVPN_USER=${GLUETUN_USER}
      - OPENVPN_PASSWORD=${GLUETUN_PW}
      - SERVER_REGIONS=${GLUETUN_REGION}
      - DOT=off
      - DNS_ADDRESS=8.8.8.8
    ports:
      #the container port(s) should be the ones needed for the container you want to use the gluetun network
      - "33339:8080"
      - "36881:36881"
      - "36881:36881/udp"
    networks:
      - vpn

  kometa: # Plex Meta Manager (rebranded to Kometa) - automates Plex collections, overlays & metadata
    image: kometateam/kometa:latest
    container_name: kometa
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - KOMETA_TIME=03:00        # Daily run at 3 AM; use comma-separated times for multiple runs
      - KOMETA_CONFIG=/config/config.yml
    volumes:
      - ${MEDIA_CONFIG_DIR}/kometa:/config
    restart: unless-stopped

  qbittorrent-media:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent-media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - DOWNLOAD_DIRECTORY=${DOWNLOAD_DIRECTORY}
    volumes:
      - ${MEDIA_CONFIG_DIR}/qbittorrent:/config
      - ${MEDIA_DIR}/torrents:/media/torrents
    #    ports:
    #      - 8080:8080
    #      - 6881:6881
    #      - 6881:6881/udp
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
