name: ebook-crawler
services:
  ebook-crawler:
    image: ghcr.io/example-user/ebook-crawler:latest
    container_name: ebook-crawler
    env_file:
      - stack.env
    volumes:
      - /DATA/AppData/ebook-crawler:/data/
    ports:
      - 8080:8080
    restart: unless-stopped
    network_mode: bridge
